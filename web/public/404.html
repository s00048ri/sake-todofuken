<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>日本酒の地理学</title>
  <script>
    // GitHub Pages SPA リダイレクトハック (Rafael Pedicini の手法を簡略化)
    // /sake-todofuken/foo/bar → /sake-todofuken/?p=/foo/bar にリダイレクト
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
